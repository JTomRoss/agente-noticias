# Briefing de mañana: lunes-viernes a las 10:50 UTC (≈06:50 Chile invierno UTC-4).
# Objetivo: que el correo LLEGUE ~07:00 Chile, descontando ~10 min de procesamiento.
# OJO 1: GitHub Actions encola los cron y puede retrasarlos 10-45 min en horas de carga; la hora de llegada variará.
# OJO 2: cuando Chile pase a UTC-3 (verano austral, ~sept), restar 1h: 10:50 -> 09:50 UTC.
# Los lunes el script usa 72 h de noticias para cubrir el fin de semana.

name: Daily briefing

on:
  schedule:
    - cron: "50 10 * * 1-5"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_DESTINO_BRIEFING: ${{ secrets.EMAIL_DESTINO_BRIEFING }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          BRIEFING_MODE: diario
        run: python daily_briefing.py
