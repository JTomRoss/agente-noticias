# Briefing de mañana: lunes-viernes a las 11:00 UTC (≈08:00 Chile).
# Los lunes el script usa 72 h de noticias para cubrir el fin de semana.
# El job tiene permiso de escritura para persistir trending_state.json
# (memoria de temas 🟢/🔴 del Market Trending entre ejecuciones).

name: Daily briefing

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          BRIEFING_MODE: diario
        run: python daily_briefing.py

      - name: Persist trending state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trending_state.json || true
          git diff --cached --quiet || git commit -m "chore: actualiza trending_state.json [skip ci]"
          git push || true
