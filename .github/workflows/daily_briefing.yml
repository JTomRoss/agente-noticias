# Briefing de mañana: lunes-viernes a las 10:00 UTC (≈06:00 Chile invierno UTC-4).
# Objetivo: que el correo LLEGUE antes de las 8:00 Chile con holgura, absorbiendo la demora de GitHub.
# OJO 1: GitHub Actions encola los cron y puede retrasarlos 10-45 min en horas de carga; la hora de llegada variará.
# OJO 2: cuando Chile pase a UTC-3 (verano austral, ~sept), restar 1h: 10:00 -> 09:00 UTC.
# Los lunes el script usa 72 h de noticias para cubrir el fin de semana.

name: Daily briefing

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_DESTINO_BRIEFING: ${{ secrets.EMAIL_DESTINO_BRIEFING }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          BRIEFING_MODE: diario
        run: python daily_briefing.py

      - name: Persistir memoria y estado
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings_memoria.json jpm_am_watch_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios de estado que commitear."
          else
            git commit -m "chore: memoria de briefings y estado JPM [skip ci]"
            git push
          fi
