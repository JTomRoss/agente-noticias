# Briefing de mañana: lunes-viernes a las 12:00 UTC (≈08:00 Chile en horario de invierno UTC-4).
# Nota: cuando Chile vuelva a UTC-3 (verano austral, ~sept), 8am Chile = 11:00 UTC; habría que ajustar.
# Los lunes el script usa 72 h de noticias para cubrir el fin de semana.

name: Daily briefing

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_DESTINO_BRIEFING: ${{ secrets.EMAIL_DESTINO_BRIEFING }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          BRIEFING_MODE: diario
        run: python daily_briefing.py
