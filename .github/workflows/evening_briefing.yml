# Se deja el archivo por si se quiere reactivar: descomentar el bloque "schedule".
# Para reactivar manualmente: Actions -> Resumen vespertino (DESACTIVADO) -> Run workflow.

name: Resumen vespertino (DESACTIVADO)

on:
  # schedule:
  #   - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  vespertino:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py (modo vespertino)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          BRIEFING_MODE: vespertino
        run: python daily_briefing.py
