# Resumen vespertino: lunes-viernes a las 22:00 UTC (≈18:00 Chile UTC-4 / 19:00 Chile UTC-3).
# Usa los últimos 11 h de noticias para cubrir desde el briefing de mañana.
# Sin tabla de precios. Sin vigilancia JPM (solo se hace una vez al día en el briefing de mañana).

name: Resumen vespertino

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  vespertino:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily_briefing.py (modo vespertino)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          BRIEFING_MODE: vespertino
        run: python daily_briefing.py
